<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stampa Flotta — PP Cremona</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f1115;color:#e2e8f0;font-family:'Barlow',sans-serif;min-height:100vh;padding:24px 16px;max-width:480px;margin:0 auto;}
h1{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:3px;color:#f5a623;text-align:center;margin-bottom:4px;}
.sub{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:28px;text-transform:uppercase;}
.form-group{margin-bottom:16px;}
label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:5px;}
input,select{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#e2e8f0;font-family:'Barlow',sans-serif;font-size:15px;padding:10px 12px;outline:none;}
.btn{width:100%;height:52px;border:none;border-radius:12px;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;cursor:pointer;margin-bottom:10px;}
.btn-tutti{background:linear-gradient(135deg,#1a1a2e,#e74c3c);color:#fff;}
.btn-km{background:linear-gradient(135deg,#1a1a2e,#f5a623);color:#1a1a2e;}
.btn-rif{background:linear-gradient(135deg,#1a1a2e,#27ae60);color:#fff;}
.btn-back{background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.4);font-size:13px;font-family:'Barlow',sans-serif;height:44px;}
.status{text-align:center;padding:12px;margin-top:12px;border-radius:8px;font-size:13px;display:none;}
.status.show{display:block;}
.status.ok{background:rgba(39,174,96,0.15);color:#7dcfaa;}
.status.err{background:rgba(231,76,60,0.15);color:#e74c3c;}
.divider{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin:20px 0 12px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.08);}
</style>
</head>
<body>
<h1>🖨️ STAMPA FLOTTA</h1>
<div class="sub">Polizia Provinciale di Cremona</div>

<div class="form-group">
  <label>Mese</label>
  <input type="month" id="mese">
</div>

<div class="divider">📄 Stampa singolo veicolo</div>
<div class="form-group">
  <label>Targa veicolo</label>
  <select id="targa">
    <option value="">— Seleziona targa —</option>
  </select>
</div>
<button class="btn btn-km" onclick="stampaKm()">🚗 Scheda Viaggio</button>
<button class="btn btn-rif" onclick="stampaRif()">⛽ Foglio Carburante</button>

<div class="divider">📋 Stampa tutti i veicoli</div>
<button class="btn btn-tutti" onclick="stampaTutto()">🖨️ Stampa Tutto (Schede + Carburante)</button>

<div class="status" id="status"></div>
<button class="btn btn-back" onclick="window.location.href='flotta.html'" style="margin-top:16px;">← Torna a Registro Flotta</button>

<script>
const URL_GS = 'https://script.google.com/macros/s/AKfycbzY8hcFw4FJueOFcFaTGJniKu64Y-36fFeJ6FDsGC1N_GpuxMYteCTrtknnsivOakY/exec';

// Mese precedente come default
var now=new Date();
var y=now.getFullYear(),m=now.getMonth();
if(m===0){m=12;y--;}
document.getElementById('mese').value=y+'-'+String(m).padStart(2,'0');

function nomeMese(n){return['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'][n];}
function dataStr(dt){return dt?dt.split(',')[0].trim():'';}
function calcolaTurno(dt){
  if(!dt)return'';
  var hm=dt.indexOf(',')>=0?dt.split(',')[1].trim():dt.split(' ')[1]||'';
  var h=parseInt(hm.split(':')[0])||0;
  if(h>=7&&h<13)return'7/13';
  if(h>=13&&h<19)return'13/19';
  return'19/7';
}

function setStatus(msg,ok){
  var el=document.getElementById('status');
  el.textContent=msg;
  el.className='status show '+(ok?'ok':'err');
}

// Carica targhe dallo storico
async function caricaTarghe(){
  try{
    var res=await fetch(URL_GS+'?action=storico');
    var d=await res.json();
    var tutto=(d.km||[]).concat(d.rif||[]);
    var map={};
    tutto.forEach(function(r){if(r.targa)map[r.targa.toUpperCase()]=true;});
    var list=Object.keys(map).sort();
    var sel=document.getElementById('targa');
    sel.innerHTML='<option value="">— Seleziona targa —</option>';
    list.forEach(function(t){sel.innerHTML+='<option>'+t+'</option>';});
  }catch(e){}
}
caricaTarghe();

function getMeseInfo(){
  var mese=document.getElementById('mese').value;
  if(!mese){alert('Seleziona un mese');return null;}
  var parts=mese.split('-');
  return{anno:parseInt(parts[0]),meseNum:parseInt(parts[1]),meseLabel:nomeMese(parseInt(parts[1])-1)+' '+parts[0]};
}

function filtraPerMeseETarga(arr,meseNum,anno,targa){
  return arr.filter(function(r){
    if(!r.dataOra)return false;
    var p=r.dataOra.split('/');if(p.length<3)return false;
    var m2=parseInt(p[1]),a=parseInt(p[2]);if(a<100)a+=2000;
    var targaOk=!targa||(r.targa&&r.targa.toUpperCase()===targa.toUpperCase());
    return m2===meseNum&&a===anno&&targaOk;
  });
}

var CSS='@page{margin:10mm;size:A4 portrait;}body{font-family:Arial,sans-serif;font-size:10px;color:#000;margin:0;padding:0;}.page{page-break-after:always;page-break-inside:avoid;padding:4px 0;}.page:last-child{page-break-after:avoid;}.header-doc{text-align:center;margin-bottom:6px;border-bottom:2px solid #000;padding-bottom:5px;}.titolo-doc{font-size:14px;font-weight:bold;letter-spacing:1px;}.sub-doc{font-size:12px;font-weight:bold;}.prov{font-size:10px;text-align:left;margin-bottom:3px;}.mese-targa{display:flex;gap:30px;margin:5px 0;font-size:10px;}.mese-targa strong{min-width:90px;border-bottom:1px solid #000;display:inline-block;}table{width:100%;border-collapse:collapse;margin-top:4px;}th{background:#e0e0e0;font-size:8px;font-weight:bold;text-align:center;padding:3px 2px;border:1px solid #000;}td{font-size:8px;padding:2px 3px;border:1px solid #000;height:12px;text-align:right;}td:first-child{text-align:center;}.tot-table{width:100%;border-collapse:collapse;margin-top:8px;}.tot-table td{border:1px solid #000;padding:3px 6px;font-size:9px;}.tot-table td:first-child{font-weight:bold;background:#f0f0f0;width:55%;}.firma-table{width:100%;border-collapse:collapse;margin-top:3px;}.firma-table td{border:1px solid #000;padding:16px 6px 3px;font-size:9px;}.carb-row{display:flex;gap:20px;margin:5px 0;font-size:10px;}.chk{width:11px;height:11px;border:1px solid #000;display:inline-block;text-align:center;line-height:10px;font-size:9px;margin-right:3px;}.info-row{display:flex;gap:6px;align-items:baseline;margin-bottom:3px;}.info-row span{font-size:8px;}.info-row strong{min-width:100px;border-bottom:1px solid #000;display:inline-block;font-size:11px;}@media print{.no-print{display:none;}}';

function paginaKm(targa,meseLabel,righe){
  var rows='';
  righe.forEach(function(r){
    var kmI=(parseInt(r.kmFinali)||0)-(parseInt(r.kmGiorno)||0);
    rows+='<tr><td>'+dataStr(r.dataOra)+'</td><td></td><td>'+calcolaTurno(r.dataOra)+'</td><td>'+kmI+'</td><td>'+(r.kmFinali||'')+'</td><td>'+(r.kmGiorno||0)+'</td></tr>';
  });
  for(var i=righe.length;i<25;i++) rows+='<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td></tr>';
  return '<div class="page">'
    +'<div class="header-doc"><div class="titolo-doc">POLIZIA LOCALE</div><div class="sub-doc">SCHEDA VIAGGIO MENSILE</div></div>'
    +'<div class="prov">Provincia di Cremona</div>'
    +'<div class="mese-targa"><div>MESE &nbsp;<strong>'+meseLabel+'</strong></div><div>TARGA &nbsp;<strong>'+targa+'</strong></div></div>'
    +'<table><thead><tr><th>DATA</th><th>PERSONE A BORDO</th><th>TURNO</th><th>KM INIZIO</th><th>KM FINE</th><th>KM PERCORSI</th></tr></thead><tbody>'+rows+'</tbody></table>'
    +'</div>';
}

function paginaRif(targa,meseLabel,righe,isLast){
  var rows='';
  var isBenzina=true,kmInizio=0,kmFine=0;
  if(righe.length>0){
    isBenzina=(righe[0].carburante||'BENZINA').toUpperCase().includes('BENZ');
    kmInizio=parseFloat(righe[0].km)||0;
    kmFine=parseFloat(righe[righe.length-1].km)||0;
    righe.forEach(function(r){
      rows+='<tr><td>'+dataStr(r.dataOra)+'</td><td>'+(r.importo||'')+'</td><td>'+(r.km||'')+'</td><td>'+(r.costoLitro||'')+'</td></tr>';
    });
  }
  for(var i=righe.length;i<10;i++) rows+='<tr><td>&nbsp;</td><td></td><td></td><td></td></tr>';
  return '<div class="page"'+(isLast?' style="page-break-after:avoid;"':'')+'>'
    +'<div class="header-doc"><div class="titolo-doc">FOGLIO CARBURANTE</div><div class="sub-doc">Provincia di Cremona — POLIZIA LOCALE</div></div>'
    +'<div class="info-row"><span>MESE</span>&nbsp;<strong>'+meseLabel+'</strong></div>'
    +'<div class="info-row"><span>TARGA</span>&nbsp;<strong>'+targa+'</strong></div>'
    +'<div class="carb-row"><span><span class="chk">'+(isBenzina?'✓':'')+'</span>BENZINA</span><span><span class="chk">'+(!isBenzina?'✓':'')+'</span>GASOLIO</span></div>'
    +'<table><thead><tr><th>DATA</th><th>IMPORTO</th><th>KM VEICOLO</th><th>COSTO AL LITRO</th></tr></thead><tbody>'+rows+'</tbody></table>'
    +'<table class="tot-table"><tr><td>KM FINE MESE</td><td>'+kmFine+'</td></tr><tr><td>KM INIZIO MESE</td><td>'+kmInizio+'</td></tr><tr><td>KM PERCORSI MESE</td><td>'+Math.round(kmFine-kmInizio)+'</td></tr></table>'
    +'<table class="firma-table"><tr><td>Firma conducente</td><td>Firma responsabile</td></tr></table>'
    +'</div>';
}

function apriPDF(bodyHtml,titolo){
  var html='<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><title>'+titolo+'</title><style>'+CSS+'</style></head><body>'+bodyHtml+'<div class="no-print" style="margin:20px;text-align:center;"><button onclick="window.print()" style="padding:12px 30px;font-size:16px;cursor:pointer;background:#1a1a2e;color:#f5a623;border:none;border-radius:8px;">🖨️ Stampa / Salva PDF</button><button onclick="window.close()" style="margin-left:12px;padding:12px 20px;font-size:14px;cursor:pointer;">✕ Chiudi</button></div></body></html>';
  var win=window.open('','_blank');win.document.write(html);win.document.close();
}

async function stampaKm(){
  var info=getMeseInfo(); if(!info)return;
  var targa=document.getElementById('targa').value;
  if(!targa){alert('Seleziona una targa');return;}
  setStatus('⏳ Caricamento...',true);
  try{
    var res=await fetch(URL_GS+'?action=storico');
    var d=await res.json();
    var righe=filtraPerMeseETarga(d.km||[],info.meseNum,info.anno,targa);
    apriPDF(paginaKm(targa,info.meseLabel,righe),'Scheda Viaggio - '+targa+' - '+info.meseLabel);
    setStatus('✅ '+righe.length+' registrazioni per '+targa,true);
  }catch(e){setStatus('⚠️ Errore: '+e.message,false);}
}

async function stampaRif(){
  var info=getMeseInfo(); if(!info)return;
  var targa=document.getElementById('targa').value;
  if(!targa){alert('Seleziona una targa');return;}
  setStatus('⏳ Caricamento...',true);
  try{
    var res=await fetch(URL_GS+'?action=storico');
    var d=await res.json();
    var righe=filtraPerMeseETarga(d.rif||[],info.meseNum,info.anno,targa);
    apriPDF(paginaRif(targa,info.meseLabel,righe,true),'Foglio Carburante - '+targa+' - '+info.meseLabel);
    setStatus('✅ '+righe.length+' rifornimenti per '+targa,true);
  }catch(e){setStatus('⚠️ Errore: '+e.message,false);}
}

async function stampaTutto(){
  var info=getMeseInfo(); if(!info)return;
  setStatus('⏳ Caricamento tutti i dati...',true);
  try{
    var res=await fetch(URL_GS+'?action=storico');
    var d=await res.json();
    var kmMese=filtraPerMeseETarga(d.km||[],info.meseNum,info.anno,null);
    var rifMese=filtraPerMeseETarga(d.rif||[],info.meseNum,info.anno,null);

    var map={};
    kmMese.forEach(function(r){if(r.targa)map[r.targa.toUpperCase()]=true;});
    rifMese.forEach(function(r){if(r.targa)map[r.targa.toUpperCase()]=true;});
    var targhe=Object.keys(map).sort();

    if(!targhe.length){setStatus('⚠️ Nessun dato per '+info.meseLabel,false);return;}

    var body='';
    targhe.forEach(function(targa,idx){
      var isLast=(idx===targhe.length-1);
      var kmT=kmMese.filter(function(r){return r.targa&&r.targa.toUpperCase()===targa;});
      var rifT=rifMese.filter(function(r){return r.targa&&r.targa.toUpperCase()===targa;});
      body+=paginaKm(targa,info.meseLabel,kmT);
      body+=paginaRif(targa,info.meseLabel,rifT,isLast);
    });

    apriPDF(body,'Report Flotta - '+info.meseLabel);
    setStatus('✅ '+targhe.length+' veicoli — '+(targhe.length*2)+' pagine per '+info.meseLabel,true);
  }catch(e){setStatus('⚠️ Errore: '+e.message,false);}
}
</script>
</body>
</html>
